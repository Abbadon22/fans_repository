name: Release Fans Launcher

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: Fans Launcher v__VERSION__
          releaseBody: |
            ## Fans Launcher v__VERSION__

            - Скачайте **Fans Launcher_*_x64-setup.exe** (установщик Windows)
            - Список модов: [manifest.json](https://github.com/Abbadon22/fans_repository/blob/main/manifest.json)
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
