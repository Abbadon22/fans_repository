name: Release Fans Launcher

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Validate signing secret
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            throw "Secret TAURI_SIGNING_PRIVATE_KEY is not set. Add it in Settings → Secrets → Actions."
          }
          Write-Host "Signing key loaded ($($env:TAURI_SIGNING_PRIVATE_KEY.Length) characters)."

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: v__VERSION__
          releaseName: Fans Launcher v__VERSION__
          releaseBody: |
            ## Fans Launcher v__VERSION__

            - Скачайте **Fans Launcher_*_x64-setup.exe** (установщик Windows)
            - Уже установленным копиям обновление придёт автоматически (`latest.json`)
            - Моды скачиваются с игрового сервера (`epyc2.worldhosts.fun:22499`)
            - Миграция старых GitHub-URL манифеста на сервер при первом запуске
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
